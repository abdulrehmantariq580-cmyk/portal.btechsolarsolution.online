<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposals | BTech Solar</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .proposal-card {
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header" style="height: auto; min-height: 90px; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border);">
                <img src="../assets/images/logo.jpeg" alt="BTech Solar Logo" style="width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); background-color: #fff;" onerror="this.src='https://ui-avatars.com/api/?name=BTech+Solar&background=f59e0b&color=fff&rounded=true&size=55'">
                <div>
                    <h2 style="font-size: 1.15rem; font-weight: 700; color: var(--primary); margin: 0; line-height: 1.2; display: flex; flex-direction: column;">
                        <span>BTech <span style="color: var(--secondary);">Solar</span></span>
                        <span style="font-size: 0.85rem; color: var(--text-main); font-weight: 500;">Solutions</span>
                    </h2>
                    <p style="font-size: 0.65rem; color: var(--text-muted); margin-top: 0.25rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Enterprise Portal</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fa-solid fa-grip"></i> Dashboard
                </a>
                <a href="crm.html" class="nav-item">
                    <i class="fa-solid fa-users"></i> CRM & Leads
                </a>
                <a href="proposals.html" class="nav-item active">
                    <i class="fa-solid fa-file-invoice-dollar"></i> Proposals / Quotes
                </a>
                <a href="installations.html" class="nav-item">
                    <i class="fa-solid fa-helmet-safety"></i> Installations
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fa-solid fa-boxes-stacked"></i> Inventory
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fa-solid fa-chart-line"></i> Reports
                </a>
                
                <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                    <a href="#" class="nav-item">
                        <i class="fa-solid fa-gear"></i> Settings
                    </a>
                    <a href="../index.html" class="nav-item" style="color: #ef4444;">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </a>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-search" style="color: var(--text-muted);"></i>
                    <input type="text" placeholder="Search leads, invoices, inventory...">
                </div>

                <div class="header-actions">
                    <button class="action-btn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    
                    <div class="user-profile">
                        <div class="avatar">A</div>
                        <div>
                            <p style="font-weight: 500; font-size: 0.9rem;">Admin User</p>
                            <p style="font-size: 0.75rem; color: var(--text-muted);">Super Admin</p>
                        </div>
                        <i class="fa-solid fa-chevron-down" style="font-size: 0.8rem; margin-left: 0.5rem;"></i>
                    </div>
                </div>
            </header>

            <div class="dashboard-body">
                <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
                    <div>
                        <h1>Automated Proposals</h1>
                        <p style="color: var(--text-muted);">Quotes syncing directly with the Backend Database.</p>
                    </div>
                </div>

                <div id="proposalsList">
                    <p style="color: var(--text-muted);">Loading proposals...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
